<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>N-Dimensional Wireframe</title>

<style>
body{
    margin:0;
    overflow:hidden;
    background:#111;
}

canvas{
    display:block;
}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<script>

////////////////////////////////////////////////////////////
// Configuration

const DIMENSIONS = 4;

const CAMERA_DISTANCE = 4;

const SCALE = 250;

////////////////////////////////////////////////////////////

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resize(){
    canvas.width = innerWidth;
    canvas.height = innerHeight;
}

addEventListener("resize",resize);
resize();

////////////////////////////////////////////////////////////
// Hypercube

function makeVertices(n){

    const vertices=[];

    for(let bits=0; bits<(1<<n); bits++){

        const v=[];

        for(let i=0;i<n;i++)
            v.push((bits&(1<<i)) ? 1 : -1);

        vertices.push(v);

    }

    return vertices;
}

function makeEdges(n){

    const edges=[];

    for(let v=0;v<(1<<n);v++){

        for(let axis=0;axis<n;axis++){

            const u=v^(1<<axis);

            if(v<u)
                edges.push([v,u]);

        }

    }

    return edges;

}

const vertices = makeVertices(DIMENSIONS);
const edges = makeEdges(DIMENSIONS);

////////////////////////////////////////////////////////////
// Rotations

const rotations=[];

for(let i=0;i<DIMENSIONS;i++){

    for(let j=i+1;j<DIMENSIONS;j++){

        rotations.push({

            a:i,
            b:j,

            speed:
                0.2+
                Math.random()*0.8

        });

    }

}

function rotate(v,a,b,angle){

    const out=[...v];

    const c=Math.cos(angle);
    const s=Math.sin(angle);

    out[a]=c*v[a]-s*v[b];
    out[b]=s*v[a]+c*v[b];

    return out;

}

////////////////////////////////////////////////////////////
// Recursive projection

function project(v){

    v=[...v];

    while(v.length>2){

        const last=v[v.length-1];

        const scale=CAMERA_DISTANCE/(CAMERA_DISTANCE-last);

        v=v
            .slice(0,-1)
            .map(x=>x*scale);

    }

    return [
        canvas.width/2+v[0]*SCALE,
        canvas.height/2-v[1]*SCALE
    ];

}

////////////////////////////////////////////////////////////

let time=0;

function draw(){

    requestAnimationFrame(draw);

    time+=0.01;

    ctx.fillStyle="#111";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    const projected=[];

    for(const vertex of vertices){

        let v=[...vertex];

        for(const r of rotations){

            v=rotate(
                v,
                r.a,
                r.b,
                time*r.speed
            );

        }

        projected.push(project(v));

    }

    ctx.strokeStyle="white";
    ctx.lineWidth=1.5;

    ctx.beginPath();

    for(const edge of edges){

        const a=projected[edge[0]];
        const b=projected[edge[1]];

        ctx.moveTo(a[0],a[1]);
        ctx.lineTo(b[0],b[1]);

    }

    ctx.stroke();

    ctx.fillStyle="white";
    ctx.font="16px sans-serif";
    ctx.fillText(`${DIMENSIONS}D Hypercube`,20,30);
    ctx.fillText(`${vertices.length} vertices`,20,50);
    ctx.fillText(`${edges.length} edges`,20,70);

}

draw();

</script>

</body>
</html>
